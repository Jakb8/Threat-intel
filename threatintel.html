<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThreatIntel Agent</title>
<style>
body{
  background:#0a0e14;color:#d8dee9;font-family:Arial,sans-serif;
  max-width:1000px;margin:auto;padding:40px;
}
input,button{
  padding:12px;border-radius:6px;border:1px solid #1f2733;
}
input{width:70%;background:#10151d;color:#fff;}
button{background:#3ddc97;border:none;cursor:pointer;}
.card{
  background:#10151d;border:1px solid #1f2733;
  border-radius:10px;padding:20px;margin-top:20px;
}
.hidden{display:none;}
pre{white-space:pre-wrap;}
</style>
</head>
<body>

<h1>THREATINTEL_AGENT</h1>
<p>Console de raisonnement – Agent IA</p>

<div>
  <input id="queryInput" placeholder="Ex: 185.220.101.45">
  <button id="analyzeBtn">Analyser</button>
</div>

<p>API : <span id="apiStatus">Vérification...</span></p>

<div class="card hidden" id="errorCard">
  <h3>Erreur</h3>
  <div id="errorText"></div>
</div>

<div class="card hidden" id="traceCard">
  <h3>Trace de raisonnement</h3>
  <div id="traceBody"></div>
</div>

<div class="card hidden" id="resultCard">
  <h3>Verdict</h3>
  <div id="verdict"></div>
  <hr>
  <h3>Analyse IA</h3>
  <pre id="llm-analysis">En attente...</pre>
</div>

<script>
const API_URL = "http://192.168.130.5:5000/api/analyze";

async function checkApi(){
  const status = document.getElementById("apiStatus");
  try{
    await fetch("http://192.168.130.5:5000/");
    status.textContent = "Connectée";
    status.style.color = "#3ddc97";
  }catch(e){
    status.textContent = "Déconnectée";
    status.style.color = "#ff5c5c";
  }
}
checkApi();

document.getElementById("analyzeBtn")
.addEventListener("click", runAgent);

document.getElementById("queryInput")
.addEventListener("keydown", e=>{
  if(e.key==="Enter") runAgent();
});

async function runAgent(){
  const query =
      document.getElementById("queryInput").value.trim();

  if(!query){
    alert("Veuillez saisir une adresse IP.");
    return;
  }

  document.getElementById("errorCard").classList.add("hidden");
  document.getElementById("traceCard").classList.add("hidden");
  document.getElementById("resultCard").classList.add("hidden");

  try{
    const response = await fetch(API_URL,{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        query:query
      })
    });

    const data = await response.json();
    console.log(data);

    if(!response.ok){
      throw new Error(
        data.errors?.join("\n")
        || "Erreur côté serveur"
      );
    }

    renderTrace(data);
    renderResult(data);

  }catch(err){
    document.getElementById("errorCard")
      .classList.remove("hidden");
    document.getElementById("errorText")
      .textContent = err.message;
  }
}

function renderTrace(data){
  const card = document.getElementById("traceCard");
  const body = document.getElementById("traceBody");

  body.innerHTML = "";

  (data.reasoning_steps || []).forEach(step=>{
    const p = document.createElement("p");
    p.textContent = "› " + step;
    body.appendChild(p);
  });

  card.classList.remove("hidden");
}

function renderResult(data){
  const verdict = data.verdict || {};
  const abuse = data.abuse_data || {};

  document.getElementById("verdict").innerHTML = `
    <p><strong>IP :</strong> ${abuse.ip || "-"}</p>
    <p><strong>Niveau :</strong> ${verdict.label || "-"}</p>
    <p><strong>Score :</strong> ${verdict.score ?? "-"}/100</p>
    <p><strong>Pays :</strong> ${abuse.country || "-"}</p>
    <p><strong>ISP :</strong> ${abuse.isp || "-"}</p>
    <p><strong>Signalements :</strong> ${abuse.total_reports ?? 0}</p>
  `;

  document.getElementById("llm-analysis").textContent =
      data.llm_analysis || "Aucune analyse générée.";

  document.getElementById("resultCard")
      .classList.remove("hidden");
}
</script>

</body>
</html>
